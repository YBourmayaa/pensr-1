<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <defs>
    <linearGradient id="penBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="18%" stop-color="#2c2c2c"/>
      <stop offset="35%" stop-color="#d4a843"/>
      <stop offset="50%" stop-color="#f0c96a"/>
      <stop offset="65%" stop-color="#d4a843"/>
      <stop offset="82%" stop-color="#2c2c2c"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="penClip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="30%" stop-color="#b8820f"/>
      <stop offset="50%" stop-color="#e0b44a"/>
      <stop offset="70%" stop-color="#b8820f"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="penTip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="30%" stop-color="#8a8a8a"/>
      <stop offset="50%" stop-color="#d0d0d0"/>
      <stop offset="70%" stop-color="#8a8a8a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="nibGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0c0c0"/>
      <stop offset="50%" stop-color="#909090"/>
      <stop offset="100%" stop-color="#505050"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d14"/>
      <stop offset="60%" stop-color="#0a0a10"/>
      <stop offset="100%" stop-color="#060608"/>
    </linearGradient>
    <radialGradient id="inkGlow" cx="50%" cy="85%" r="30%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="inkBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="penClipPath">
      <rect x="330" y="60" width="140" height="680" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="900" fill="url(#bgGrad)"/>
  <rect width="800" height="900" fill="url(#inkGlow)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#d4a843" stroke-width="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="750" x2="800" y2="750"/>
    <line x1="150" y1="0" x2="150" y2="900"/>
    <line x1="300" y1="0" x2="300" y2="900"/>
    <line x1="500" y1="0" x2="500" y2="900"/>
    <line x1="650" y1="0" x2="650" y2="900"/>
  </g>

  <!-- Ink drop glow under nib -->
  <ellipse cx="400" cy="790" rx="60" ry="12" fill="#d4a843" opacity="0.18" filter="url(#inkBlur)"/>
  <ellipse cx="400" cy="800" rx="30" ry="6" fill="#f0c96a" opacity="0.22" filter="url(#inkBlur)"/>

  <!-- === PEN BODY === -->

  <!-- Cap top dome -->
  <ellipse cx="400" cy="75" rx="68" ry="18" fill="#111"/>
  <rect x="332" y="60" width="136" height="22" fill="#111"/>

  <!-- Cap band (gold ring at top) -->
  <rect x="330" y="80" width="140" height="14" rx="2" fill="url(#penClip)"/>

  <!-- Main pen barrel -->
  <rect x="332" y="94" width="136" height="500" rx="4" fill="url(#penBody)"/>

  <!-- Highlight stripe down the pen -->
  <rect x="392" y="94" width="6" height="500" fill="white" opacity="0.06" rx="2"/>

  <!-- Brand engraving zone -->
  <rect x="340" y="260" width="120" height="80" rx="3" fill="#0a0a0a" opacity="0.35"/>
  <text x="400" y="298" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#d4a843" text-anchor="middle" letter-spacing="4" opacity="0.9">PENSR</text>
  <text x="400" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#b8820f" text-anchor="middle" letter-spacing="8" opacity="0.8">— 1 —</text>

  <!-- Clip (side clip on pen) -->
  <rect x="456" y="68" width="10" height="160" rx="5" fill="url(#penClip)" opacity="0.9"/>
  <ellipse cx="461" cy="230" rx="8" ry="8" fill="url(#penClip)"/>

  <!-- Grip section (darker, textured) -->
  <rect x="332" y="594" width="136" height="80" rx="2" fill="#111"/>
  <!-- Grip ridges -->
  <g stroke="#333" stroke-width="1" opacity="0.7">
    <line x1="332" y1="604" x2="468" y2="604"/>
    <line x1="332" y1="614" x2="468" y2="614"/>
    <line x1="332" y1="624" x2="468" y2="624"/>
    <line x1="332" y1="634" x2="468" y2="634"/>
    <line x1="332" y1="644" x2="468" y2="644"/>
    <line x1="332" y1="654" x2="468" y2="654"/>
    <line x1="332" y1="664" x2="468" y2="664"/>
  </g>

  <!-- Transition cone (barrel to tip) -->
  <polygon points="332,674 468,674 452,720 348,720" fill="url(#penTip)"/>

  <!-- Tip cylinder -->
  <rect x="370" y="720" width="60" height="40" fill="url(#penTip)"/>

  <!-- Nib (the writing tip) -->
  <polygon points="370,760 430,760 413,820 387,820" fill="url(#nibGrad)"/>
  <!-- Nib slit -->
  <line x1="400" y1="762" x2="400" y2="818" stroke="#333" stroke-width="1.5" opacity="0.8"/>
  <!-- Nib tip point -->
  <polygon points="387,820 413,820 400,840" fill="#888"/>

  <!-- Ink drop at nib tip -->
  <ellipse cx="400" cy="843" rx="4" ry="6" fill="#d4a843" opacity="0.85"/>
  <ellipse cx="400" cy="841" rx="2" ry="2" fill="#f5d98a" opacity="0.9"/>

  <!-- Decorative dots / serial number -->
  <text x="400" y="560" font-family="'Courier New', monospace" font-size="9" fill="#d4a843" text-anchor="middle" letter-spacing="2" opacity="0.4">v0.1 · 2024 · CDID™</text>

  <!-- Gold ring at grip transition -->
  <rect x="330" y="590" width="140" height="6" rx="1" fill="url(#penClip)"/>
  <rect x="330" y="670" width="140" height="5" rx="1" fill="url(#penClip)"/>

</svg>
