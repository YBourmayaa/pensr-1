<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48">
  <defs>
    <linearGradient id="nibGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c96a"/>
      <stop offset="100%" stop-color="#b8820f"/>
    </linearGradient>
    <linearGradient id="bodyDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#2e2e2e"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: pen in a rounded square -->
  <rect width="44" height="44" x="2" y="2" rx="10" fill="#0d0d14"/>
  <rect width="44" height="44" x="2" y="2" rx="10" fill="none" stroke="#d4a843" stroke-width="0.75" opacity="0.6"/>

  <!-- Pen barrel -->
  <rect x="18" y="7" width="12" height="24" rx="3" fill="url(#bodyDark)"/>
  <!-- Gold highlight on barrel -->
  <rect x="21" y="7" width="3" height="24" rx="1.5" fill="#d4a843" opacity="0.7"/>

  <!-- Gold ring -->
  <rect x="17" y="29" width="14" height="3" rx="1" fill="url(#nibGold)"/>

  <!-- Nib -->
  <polygon points="18,32 30,32 27,41 21,41" fill="#b0b0b0"/>
  <!-- Nib slit -->
  <line x1="24" y1="32" x2="24" y2="41" stroke="#555" stroke-width="0.8"/>
  <!-- Tip -->
  <polygon points="21,41 27,41 24,45" fill="#d4a843"/>

  <!-- Wordmark -->
  <text x="56" y="21" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#f5f5f0" letter-spacing="1">Pensr</text>
  <text x="56" y="37" font-family="'Courier New', Courier, monospace" font-size="10" fill="#d4a843" letter-spacing="3">— 1 —</text>

  <!-- Version tag -->
  <rect x="138" y="10" width="36" height="14" rx="3" fill="#d4a843" opacity="0.15"/>
  <text x="156" y="21" font-family="'Courier New', Courier, monospace" font-size="9" fill="#d4a843" text-anchor="middle" letter-spacing="1">v0.1</text>
</svg>
