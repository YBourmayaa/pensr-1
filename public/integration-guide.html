<!-- CSS to add for the hero pen (add to your stylesheet): -->
<style>
.hero-pen {
  position: absolute;        /* or relative depending on your layout */
  right: -60px;              /* adjust to your hero layout */
  top: 50%;
  transform: translateY(-50%) rotate(-8deg);
  width: clamp(300px, 40vw, 600px);
  height: auto;
  opacity: 0.92;
  pointer-events: none;
  filter: drop-shadow(0 40px 80px rgba(212, 168, 67, 0.2));
  animation: penFloat 6s ease-in-out infinite;
}

@keyframes penFloat {
  0%, 100% { transform: translateY(-50%) rotate(-8deg); }
  50%       { transform: translateY(calc(-50% - 12px)) rotate(-6deg); }
}
</style>
